<!DOCTYPE html>
<html>
<head>
    <title>Image Link + Toggle</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background: linear-gradient(to right, #1e3c72, #2a5298);
            color: white;
        }

        h2 {
            margin-top: 30px;
        }

        .card {
            margin-top: 40px;
            display: inline-block;
            padding: 20px;
            border-radius: 15px;
            background: white;
            color: black;
            box-shadow: 0px 10px 25px rgba(0,0,0,0.3);
        }

        img {
            width: 300px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        img:hover {
            transform: scale(1.05);
        }

        button {
            margin-top: 15px;
            padding: 10px 20px;
            border: none;
            background: #ff4b2b;
            color: white;
            font-size: 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #ff416c;
        }
    </style>
</head>

<body>

    <h2>🔥 Goku Image Toggle + Link</h2>

    <div class="card">

        <a href="https://wallpapercave.com/goku-hd-4k-wallpapers" target="_blank">
            <img id="myImage" 
                 src="https://wallpapercave.com/wp/wp13510569.jpg" 
                 onclick="toggleImage(event)">
        </a>

        <br>

        
        <button onclick="toggleImage(event)">Toggle Image</button>

    </div>

            event.preventDefault();

            let img = document.getElementById("myImage");

            if (img.src.includes("wp13510569")) {
