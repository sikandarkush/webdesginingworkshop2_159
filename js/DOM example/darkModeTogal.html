<!DOCTYPE html>
<html>
<head>
    <title>Dark Mode Toggle</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            transition: 0.4s;
            background: white;
            color: black;
        }

        h2 {
            margin-top: 50px;
        }

        .dark-mode {
            background: #121212;
            color: white;
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            background: black;
            color: white;
            transition: 0.3s;
        }

        .dark-mode button {
            background: white;
            color: black;
        }

        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>

    <h2>🌙 Dark Mode Toggle</h2>

    <p>Click the button to switch theme</p>

    <button onclick="toggleMode()">Toggle Mode</button>

    <script>
        function toggleMode() {
            document.body.classList.toggle("dark-mode");
        }
    </script>

</body>
</html>
